version: '3.8'

services:
  mysql_dev:
    image: mysql:8.0
    container_name: treinamento_adtsa_mysql_dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_pass
      MYSQL_DATABASE: treinamento_adtsa_dev
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_pass
    ports:
      - "3309:3306"  # Porta diferente do ambiente de produção
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dev-network

  web_dev:
    build: .
    container_name: treinamento_adtsa_web_dev
    restart: always
    ports:
      - "5001:5000"  # Porta diferente do ambiente de produção
    environment:
      # Configurações do banco de dados de desenvolvimento
      DB_HOST: mysql_dev
      DB_PORT: 3306
      DB_NAME: treinamento_adtsa_dev
      DB_USER: dev_user
      DB_PASSWORD: dev_pass
      # Configurações LDAP/Active Directory (mesmas do prod)
      LDAP_SERVER: ldap://s02rec1.adt.com.br:389
      LDAP_DOMAIN: adt.com.br
      LDAP_SEARCH_BASE: DC=adt,DC=com,DC=br
      # Outras configurações
      SECRET_KEY: chave-secreta-desenvolvimento-2024
      FLASK_ENV: development
      FLASK_DEBUG: 1
    volumes:
      # Monta código fonte para hot reload
      - ./app.py:/app/app.py
      - ./routes:/app/routes
      - ./static:/app/static
      - ./templates:/app/templates
      - C:\Users\adtsa\Videos\Treinamento - Dealernet:/app/videos
    depends_on:
      mysql_dev:
        condition: service_healthy
    networks:
      - dev-network

volumes:
  mysql_dev_data:
    driver: local

networks:
  dev-network:
    driver: bridge
