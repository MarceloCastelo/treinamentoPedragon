version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: treinamento_adtsa_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: treinamento_adtsa
      MYSQL_USER: adtsa_user
      MYSQL_PASSWORD: adtsa_pass123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  web:
    build: .
    container_name: treinamento_adtsa_web
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Configurações do banco de dados
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: treinamento_adtsa
      DB_USER: adtsa_user
      DB_PASSWORD: adtsa_pass123
      # Configurações LDAP/Active Directory
      LDAP_SERVER: ldap://s02rec1.adt.com.br:389
      LDAP_DOMAIN: adt.com.br
      LDAP_SEARCH_BASE: DC=adt,DC=com,DC=br
      # Outras configurações
      SECRET_KEY: chave-secreta-producao-docker-2024
      FLASK_ENV: production
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:
    driver: local

networks:
  app-network:
    driver: bridge
