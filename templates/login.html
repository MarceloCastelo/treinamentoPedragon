<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pedragon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        .gradient-bg {
            background: #f8fafc;
        }
        .login-animate {
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .input-focus:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .btn-animate {
            transition: all 0.2s ease;
        }
        .btn-animate:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }
        .btn-animate:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md login-animate">
        <!-- Card de Login -->
        <div class="bg-white rounded-2xl p-8 border border-gray-200 shadow-lg">
            <!-- Header com Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex flex-col items-center">
                    <div class="mb-5">
                        <img src="{{ url_for('static', filename='images/logos/pedragon2_preta.png') }}" alt="Pedragon" class="h-14 w-auto mx-auto">
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-1">Bem-vindo</h1>
                    <p class="text-gray-500 text-sm">Acesse com seu CPF e senha</p>
                </div>
            </div>
            
            <!-- Mensagens Flash -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="mb-5 rounded-xl p-4 border
                            {% if category == 'error' %}
                                bg-red-50 border-red-200 text-red-700
                            {% elif category == 'success' %}
                                bg-green-50 border-green-200 text-green-700
                            {% else %}
                                bg-blue-50 border-blue-200 text-blue-700
                            {% endif %}">
                            <div class="flex items-center">
                                <ion-icon name="
                                    {% if category == 'error' %}alert-circle-outline
                                    {% elif category == 'success' %}checkmark-circle-outline
                                    {% else %}information-circle-outline
                                    {% endif %}" class="text-xl mr-2"></ion-icon>
                                <span class="font-medium text-sm">{{ message }}</span>
                            </div>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <!-- Formulário -->
            <form method="POST" class="space-y-5">
                <!-- Campo CPF -->
                <div>
                    <label for="cpf" class="block text-gray-700 font-semibold mb-2 text-sm flex items-center">
                        <ion-icon name="card-outline" class="text-blue-600 mr-2"></ion-icon>
                        CPF
                    </label>
                    <input 
                        type="text" 
                        id="cpf" 
                        name="cpf" 
                        placeholder="000.000.000-00" 
                        required 
                        autofocus
                        maxlength="14"
                        value="{{ request.form.cpf or '' }}"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 input-focus transition-all"
                    >
                </div>
                
                <!-- Campo Senha -->
                <div>
                    <label for="password" class="block text-gray-700 font-semibold mb-2 text-sm flex items-center">
                        <ion-icon name="lock-closed-outline" class="text-blue-600 mr-2"></ion-icon>
                        Senha
                    </label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Digite sua senha" 
                        required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 input-focus transition-all"
                    >
                </div>
                
                <!-- Botão Entrar -->
                <button 
                    type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center btn-animate mt-2">
                    <ion-icon name="log-in-outline" class="text-xl mr-2"></ion-icon>
                    Entrar
                </button>
            </form>

            <!-- Botão Voltar -->
            <div class="mt-4">
                <a href="https://intranet.pedragon.local:8080"
                   class="w-full flex items-center justify-center gap-2 py-3 px-6 rounded-xl border border-gray-300 text-gray-600 font-semibold hover:bg-gray-100 btn-animate text-sm">
                    <ion-icon name="arrow-back-outline" class="text-lg"></ion-icon>
                    Voltar à ao início
                </a>
            </div>
            
            <!-- Link para Cadastro -->
            <div class="mt-5 text-center">
                <p class="text-gray-500 text-sm">
                    Ainda não tem conta?
                    <a href="{{ url_for('auth.register') }}" class="text-blue-600 font-semibold hover:text-blue-700 hover:underline ml-1">Cadastre-se</a>
                </p>
            </div>
        </div>
        

    </div>
    <script>
        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', function () {
            let v = this.value.replace(/\D/g, '').slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
            this.value = v;
        });
    </script></body>
</html>
